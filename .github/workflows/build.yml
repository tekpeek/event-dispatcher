---
name: build-image-and-push
on:
  push:
  workflow_dispatch:
    inputs:
      image-version:
        description: 'Version of the image to build'
        required: true
        default: 'stable'
      namespace:
        description: 'Namespace to deploy to'
        required: true
        default: 'default'
    
jobs:
  build:
    name: build-image-and-push
    runs-on: self-hosted
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4

    - name: Login to dockerhub
      uses: docker/login-action@v3
      with:
       username: ${{ secrets.DOCKER_USERNAME }}
       password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push event-dispatcher
      uses: docker/build-push-action@v5
      with:
       context:
       file: ./dockerfiles/Dockerfile.event-dispatcher
       push: true
       tags: kingaiva/event-dispatcher:${{ inputs.image-version || 'dev' }}

  deploy:
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      namespace: ${{ inputs.namespace || 'dev' }}
      image-version: ${{ inputs.image-version || 'dev' }}
    secrets: inherit