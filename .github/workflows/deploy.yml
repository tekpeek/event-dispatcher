---
name: deploy-event-dispatcher
on:
  workflow_call:
    inputs:
      namespace:
        description: 'Namespace to deploy to'
        required: true
        type: string
        default: 'dev'
      image-version:
        description: 'Image version to deploy'
        required: true
        type: string
        default: 'dev'

jobs:
 build:
   name: deploy-event-dispatcher
   runs-on: self-hosted
   steps:
   - name: Checkout
     uses: actions/checkout@v2
 
   - name: deploy-microservice
     run: |
       helm upgrade --install event-dispatcher helm/ \
        --set namespace=${{ inputs.namespace }} \
        --set imageVersion=${{ inputs.image-version }} \
        --set slackWebhookStockflow=${{ secrets.SLACK_WEBHOOK_STOCKFLOW }} \
        -n ${{ inputs.namespace }}